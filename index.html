<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Sentinel | M&A Risk Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { background-color: #0a0a0c; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 23, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold tracking-tight text-white mb-2">AXIOM <span class="text-blue-500">SENTINEL</span></h1>
            <p class="text-zinc-400">Autonomous M&A Due Diligence & Risk Audit</p>
        </header>

        <div class="glass p-6 rounded-2xl mb-8">
            <label class="block text-sm font-medium text-zinc-400 mb-2">OpenAI API Key (Stored Locally)</label>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div id="dropZone" class="glass border-2 border-dashed border-zinc-800 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500 transition-colors">
            <div class="mb-4">
                <svg class="mx-auto h-12 w-12 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            </div>
            <p class="text-lg font-medium text-white">Upload PDF Warrant or Purchase Agreement</p>
            <p class="text-sm text-zinc-500 mt-2">Drag and drop or click to browse</p>
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
        </div>

        <div id="status" class="hidden mt-6 p-4 rounded-lg bg-blue-500/10 text-blue-400 text-center border border-blue-500/20">
            Scanning document...
        </div>

        <div id="results" class="hidden mt-8 glass p-8 rounded-2xl animate-in fade-in slide-in-from-bottom-4">
            <div id="reportContent" class="prose prose-invert max-w-none"></div>
            <button onclick="window.print()" class="mt-8 w-full py-4 rounded-xl font-bold text-white border border-zinc-700 hover:bg-zinc-800 transition-all">Download Risk Brief (PDF)</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const results = document.getElementById('results');
        const status = document.getElementById('status');
        const reportContent = document.getElementById('reportContent');

        // Setup PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return alert("Please enter your OpenAI API Key first.");
            if (!file) return;

            status.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                // 1. Extract Text
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join(' ');
                }

                // 2. Sanitize Text
                const sanitizedText = fullText.replace(/"/g, "'").replace(/\n/g, " ");

                // 3. Call OpenAI
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4-turbo", // High reasoning for legal redlines
                        messages: [{
                            role: "user",
                            content: `ROLE: Senior M&A Attorney. CRITICAL: Exhaustive analysis. DO NOT SKIP sections.
                            AUDIT TARGET: Analyze 'Change of Control' and 'Termination' clauses.
                            WORKFLOW: For every Red Flag, provide: 1) Risk, 2) Location, 3) Proposed Redline Fix (corrected legal text).
                            FORMAT:
                            DOCUMENT TITLE: [Title]
                            RISK SCORE: [1-10]
                            RED FLAGS: [Bullet points with Redline Fixes]
                            SUMMARY: [Impact overview]
                            LEGAL NOTICE: For preliminary auditing purposes only; confirm with counsel.
                            
                            DOCUMENT TEXT: ${sanitizedText}`
                        }]
                    })
                });

                const data = await response.json();
                const finalReport = data.choices[0].message.content;

                // 4. Display Results
                reportContent.innerHTML = finalReport.replace(/\n/g, '<br>');
                status.classList.add('hidden');
                results.classList.remove('hidden');

            } catch (err) {
                alert("Error: " + err.message);
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
